name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            qt-arch: ""
          - name: Windows
            os: windows-latest
            qt-arch: win64_msvc2022_64
          - name: macOS
            os: macos-latest
            qt-arch: clang_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.2"
          arch: ${{ matrix.qt-arch }}
          modules: "qtmultimedia"
          cache: true

      - name: Platform dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build libeigen3-dev libgl1-mesa-dev libglu1-mesa-dev ccache

      - name: Platform dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja eigen ccache

      - name: Platform dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja ccache --no-progress

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-test-${{ runner.os }}-${{ hashFiles('src/**', 'tests/**') }}
          restore-keys: ccache-test-${{ runner.os }}-

      - name: Zero ccache stats
        run: ccache --zero-stats

      - name: Configure
        run: cmake --preset test -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset test

      - name: ccache stats
        run: ccache --show-stats

      - name: Test
        run: ctest --preset test
