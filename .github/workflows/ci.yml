name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            qt-arch: ""
          - name: Windows
            os: windows-latest
            qt-arch: win64_msvc2019_64
          - name: macOS
            os: macos-latest
            qt-arch: clang_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.7.3"
          arch: ${{ matrix.qt-arch }}
          modules: "qtmultimedia"
          cache: true

      - name: Platform dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build libeigen3-dev libgl1-mesa-dev libglu1-mesa-dev

      - name: Platform dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja eigen

      - name: Platform dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja --no-progress

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset test

      - name: Build
        run: cmake --build --preset test

      - name: Test
        run: ctest --preset test

  coverage:
    name: Coverage
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.7.3"
          arch: ""
          modules: "qtmultimedia"
          cache: true

      - name: Platform dependencies (Linux)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build libeigen3-dev libgl1-mesa-dev libglu1-mesa-dev
          pip install gcovr

      - name: Configure
        run: cmake --preset coverage

      - name: Build
        run: cmake --build --preset coverage

      - name: Test
        run: ctest --preset coverage

      - name: Coverage report
        run: |
          gcovr --root . --object-directory build/coverage \
            --print-summary \
            --exclude 'tests/.*' \
            --exclude 'build/.*' \
            --exclude '.*_autogen/.*' \
            --exclude '.*mocs_compilation.*' \
            --exclude '.*CompilerId.*' \
            --exclude '/usr/include/.*' \
            --exclude '/home/christian/Qt/.*' \
            --exclude 'src/main\.cpp' \
            --exclude 'src/cli/main\.cpp' \
            --exclude 'src/acoustics/dg/.*' \
            --exclude 'src/acoustics/AcousticSimulator\.cpp' \
            --exclude 'src/rendering/Viewport3D\.cpp' \
            --exclude 'src/rendering/MeshSimplifier\.cpp' \
            --exclude 'src/gui/MainWindow\.cpp' \
            --exclude 'src/gui/dialogs/AudioComparisonDialog\.cpp' \
            --exclude 'src/gui/dialogs/SettingsDialogs\.cpp' \
            --exclude 'src/gui/widgets/ColorSwatch\.cpp' \
            --exclude 'src/gui/widgets/MaterialGallery\.cpp' \
            --gcov-ignore-errors=no_working_dir_found \
            --merge-mode-functions=merge-use-line-min \
            --fail-under-line 60
